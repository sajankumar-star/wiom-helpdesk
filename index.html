<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiom IT Helpdesk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0c10;--surface:#111318;--surface2:#181c26;--surface3:#1e2333;--border:rgba(99,179,237,0.1);--border2:rgba(99,179,237,0.22);--accent:#63b3ed;--pink:#e91e8c;--text:#dde6f0;--muted:#7a8899;--success:#48bb78;--warning:#f6ad55;--danger:#fc8181;--info:#76e4f7;--user-bubble:#0f1e3a;--bot-bubble:#111825;--font:'Sora',sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-img{width:36px;height:36px;border-radius:9px;object-fit:cover;flex-shrink:0;}
.brand{flex:1;}.brand-name{font-size:15px;font-weight:600;color:var(--text);}.brand-name span{color:var(--pink);}
.brand-tag{font-size:10.5px;color:var(--muted);margin-top:1px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.online-pill{background:rgba(72,187,120,0.12);border:1px solid rgba(72,187,120,0.25);border-radius:20px;padding:3px 9px;font-size:10.5px;color:var(--success);display:flex;align-items:center;gap:4px;}
.dot{width:5px;height:5px;background:var(--success);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.cat-tabs{background:var(--surface2);border-bottom:1px solid var(--border);padding:0 14px;display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:9px 12px;font-size:11.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font);background:none;border-top:none;border-left:none;border-right:none;transition:all 0.2s;}
.cat-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.chips-row{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;min-height:42px;}
.chips-row::-webkit-scrollbar{display:none;}
.chip{background:var(--surface3);border:1px solid var(--border);border-radius:14px;padding:5px 12px;font-size:11.5px;color:var(--accent);cursor:pointer;white-space:nowrap;font-family:var(--font);flex-shrink:0;}
.chip:hover{background:rgba(99,179,237,0.1);}
.messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px;}
.message{display:flex;gap:8px;}
.message.user{flex-direction:row-reverse;}
.avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.bot-av{background:linear-gradient(135deg,var(--pink),#9c27b0);}
.user-av{background:var(--surface3);border:1px solid var(--border2);font-size:10px;color:var(--accent);font-weight:600;}
.bubble{padding:10px 14px;border-radius:13px;font-size:13px;line-height:1.75;max-width:calc(100% - 42px);}
.message.bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-top-left-radius:3px;}
.message.user .bubble{background:var(--user-bubble);border:1px solid var(--border2);border-top-right-radius:3px;}
.bubble strong{color:var(--accent);font-weight:500;}
.bubble ol,.bubble ul{padding-left:16px;margin-top:4px;}.bubble li{margin-bottom:3px;}
.ticket-card{background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:11px;margin-top:9px;font-size:12px;}
.t-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.t-id{font-family:monospace;color:var(--accent);font-size:11.5px;font-weight:500;}
.t-badge{margin-left:auto;background:rgba(72,187,120,0.15);color:var(--success);border-radius:8px;padding:2px 8px;font-size:10.5px;}
.t-row{display:flex;gap:5px;margin-bottom:4px;}.t-label{color:var(--muted);min-width:85px;font-size:11.5px;}.t-val{color:var(--text);font-size:11.5px;}.t-email{color:var(--accent);font-size:11.5px;}
.p-critical{color:var(--danger);}.p-high{color:var(--warning);}.p-medium{color:var(--info);}.p-low{color:var(--success);}
.escalate-btn{margin-top:8px;background:rgba(252,129,129,0.12);border:1px solid rgba(252,129,129,0.3);color:var(--danger);border-radius:8px;padding:6px 12px;font-size:11.5px;cursor:pointer;font-family:var(--font);width:100%;}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--pink);opacity:0.4;animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.4;}40%{opacity:1;}}
.input-wrap{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.chat-tools{display:flex;gap:8px;align-items:center;}
.tool-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;font-family:var(--font);padding:3px 6px;border-radius:6px;}
.tool-btn:hover{color:var(--accent);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;resize:none;outline:none;min-height:40px;max-height:100px;line-height:1.5;}
textarea:focus{border-color:rgba(233,30,140,0.35);}
textarea::placeholder{color:var(--muted);}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,var(--pink),#9c27b0);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}
.send-btn svg{width:16px;height:16px;fill:white;}
.footer{text-align:center;font-size:10px;color:var(--muted);padding:3px 0 5px;flex-shrink:0;}
.error-msg{color:var(--danger);}
</style>
</head>

<script>
var conv=[];var loading=false;
var CHIPS={
  laptop:['&#128187; Laptop On Nahi Ho Raha','&#128421; Screen Blink Kar Rahi Hai','&#128034; Laptop Slow Hai','&#129392; Laptop Hang Ho Raha Hai','&#9889; Laptop Auto Off Ho Raha','&#128267; Charger Problem','&#128433; Touchpad Kaam Nahi Karta','&#128260; Laptop Change Chahiye'],
  network:['&#128246; WiFi Connect Nahi Ho Raha','&#128014; Internet Slow Hai','&#128274; VPN Problem','&#128139; Email Issue','&#128225; Office WiFi Password'],
  software:['&#128190; Software Install Karna Hai','&#10060; Software Crash Ho Raha Hai','&#128202; MS Office Problem','&#128424; Printer Driver Install','&#128737; Antivirus Issue'],
  purchase:['&#128722; New Laptop Purchase','&#128424; Printer Purchase','&#128421; Monitor Purchase','&#128241; Mobile Purchase','&#128161; Equipment Quote Chahiye'],
  account:['&#128273; Password Reset','&#128274; Admin Password Chahiye','&#128275; Account Unlock','&#128100; New User Account','&#128737; 2FA Problem'],
  ticket:['&#127915; New Ticket Raise Karo','&#128203; Ticket Status Check','&#128260; Ticket Escalate Karna Hai']
};
var PROMPT='Aap Wiom IT Helpdesk Assistant hain. Sirf Hindi/Hinglish mein jawab dein. IT Admin: sajan.kumar@Wiom.in\n\nLaptop: on nahi=30sec hold,charger test | screen blink=driver update | slow=TaskMgr,startup disable | hang=Ctrl+Alt+Del | auto off=overheating,cooling pad | charger=doosra try karo | touchpad=Fn+F7,settings enable | change=ticket raise karo\nNetwork: wifi=airplane off,disable/enable,flushdns | VPN=reinstall | wifi pass=sirf IT Admin denge\nSoftware: install=approval+ticket,1-2 din | MS Office=activate,company email\nPurchase: equipment=reason+specs+ticket,5-7 din,sajan.kumar approve karenge\nAccount: password=Ctrl+Alt+Del | ADMIN PWD=sirf sajan.kumar@Wiom.in pe email | new user=dept approval+ticket\nTicket format:\n&#127915; TICKET RAISED\nID: TKT-[5 digit]\nCategory: [Hardware/Software/Network/Purchase/Account]\nPriority: [Low/Medium/High/Critical]\nAssigned To: sajan.kumar@Wiom.in\nStatus: Open\nETA: [time]\nRules: Physical check/replacement line KABHI mat likho | Friendly Hindi | Numbered steps | Sirf IT';

function switchCat(btn,cat){
  document.querySelectorAll('.cat-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderChips(cat);
}
function renderChips(cat){
  var row=document.getElementById('chipsRow');
  row.innerHTML='';
  (CHIPS[cat]||[]).forEach(function(label){
    var btn=document.createElement('button');
    btn.className='chip';
    btn.innerHTML=label;
    btn.onclick=function(){
      document.getElementById('input').value=btn.innerText.replace(/^.\s/,'').trim();
      sendMessage();
    };
    row.appendChild(btn);
  });
}
function addMsg(role,content,isHtml){
  var div=document.createElement('div');div.className='message '+role;
  var av=document.createElement('div');av.className='avatar '+(role==='bot'?'bot-av':'user-av');
  av.innerHTML=role==='bot'?'&#129302;':'WM';
  var bub=document.createElement('div');bub.className='bubble';
  if(isHtml)bub.innerHTML=content;else bub.textContent=content;
  div.appendChild(av);div.appendChild(bub);
  var msgs=document.getElementById('messages');
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  var d=document.createElement('div');d.className='message bot';d.id='typing-ind';
  d.innerHTML='<div class="avatar bot-av">&#129302;</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  var msgs=document.getElementById('messages');msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){var t=document.getElementById('typing-ind');if(t)t.remove();}
function formatReply(text){
  var h=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/&#127915; TICKET RAISED\n([\s\S]*?)(?=\n\n|$)/g,function(m,body){
    var lines=body.trim().split('\n').filter(Boolean);
    var tid='',pri='';
    lines.forEach(function(l){if(l.startsWith('ID:'))tid=l.replace('ID:','').trim();if(l.startsWith('Priority:'))pri=l.replace('Priority:','').trim();});
    var c='<div class="ticket-card"><div class="t-head"><span class="t-id">&#127915; '+tid+'</span><span class="t-badge">Open</span></div>';
    lines.forEach(function(line){
      if(line.startsWith('ID:')||line.startsWith('Status:'))return;
      var p=line.split(':');var k=p[0];var v=p.slice(1).join(':').trim();if(!v)return;
      var vc='t-val';if(k.trim()==='Priority'){if(v==='Critical')vc='t-val p-critical';else if(v==='High')vc='t-val p-high';else if(v==='Medium')vc='t-val p-medium';else vc='t-val p-low';}
      if(k.trim()==='Assigned To')vc='t-email';
      c+='<div class="t-row"><span class="t-label">'+k.trim()+'</span><span class="'+vc+'">'+v+'</span></div>';
    });
    var tnum=Math.floor(10000+Math.random()*90000);
    c+='<button class="escalate-btn" onclick="escalateTicket('+tnum+')">&#128680; Admin ko Escalate Karo</button></div>';
    return c;
  });
  h=h.replace(/(?:^|\n)(\d+)\. (.+)/g,function(m,n,ct){return '<li>'+ct+'</li>';});
  h=h.replace(/(<li>[\s\S]*?<\/li>)/g,function(s){return '<ol>'+s+'</ol>';});
  h=h.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  return h;
}
async function sendMessage(){
  var txt=document.getElementById('input').value.trim();
  if(!txt||loading)return;
  document.getElementById('input').value='';
  document.getElementById('input').style.height='auto';
  loading=true;document.getElementById('sendBtn').disabled=true;
  addMsg('user',txt);
  conv.push({role:'user',content:txt});
  showTyping();
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:PROMPT,messages:conv})
    });
    var data=await res.json();removeTyping();
    if(data.content&&data.content[0]){
      var reply=data.content[0].text;
      conv.push({role:'assistant',content:reply});
      addMsg('bot',formatReply(reply),true);
    } else {addMsg('bot','<span class="error-msg">Error. Dobara try karein.</span>',true);}
  }catch(e){removeTyping();addMsg('bot','<span class="error-msg">Connection error.</span>',true);}
  loading=false;document.getElementById('sendBtn').disabled=false;
  document.getElementById('input').focus();
}
function clearChat(){if(!confirm('Chat clear karein?'))return;document.getElementById('messages').innerHTML='';conv=[];addMsg('bot','Chat clear ho gaya! &#128522;',false);}
function escalateToAdmin(){
  var last=conv.filter(function(m){return m.role==='user';}).pop();
  var msg=last?last.content:'IT Issue';
  var sub=encodeURIComponent('[URGENT] IT Issue: '+msg.slice(0,50));
  var bod=encodeURIComponent('Namaste Sajan ji,\n\nProblem: '+msg+'\n\nKripya jaldi resolve karein.\n\nDhanyawad');
  window.open('mailto:sajan.kumar@Wiom.in?subject='+sub+'&body='+bod);
}
function escalateTicket(n){
  var sub=encodeURIComponent('[ESCALATION] Ticket TKT-'+n);
  var bod=encodeURIComponent('Namaste Sajan ji,\n\nTKT-'+n+' ka follow-up.\n\nDhanyawad');
  window.open('mailto:sajan.kumar@Wiom.in?subject='+sub+'&body='+bod);
}
document.getElementById('input').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
renderChips('laptop');
